<!DOCTYPE html>
<html lang="pt-pt" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeOS | Central de Tarefas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { accent: 'var(--accent)' } } }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        /* Esconder barra de rolagem mas manter funcional */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="flex h-[100dvh] overflow-hidden bg-bg-color text-base transition-colors duration-300">

    <div id="sidebar-container" class="shrink-0 z-50 h-full flex flex-col transition-all duration-300"></div>

    <main class="flex-1 overflow-hidden relative flex flex-col h-full w-full">
        
        <header class="shrink-0 bg-bg-color/80 backdrop-blur-md border-b border-theme p-4 lg:p-8 flex items-center justify-between z-30">
            <div class="flex items-center gap-3 lg:gap-4">
                <button id="mobile-menu-btn" onclick="window.toggleMobileMenu()" class="md:hidden text-strong text-2xl hover:text-blue-500 transition-colors p-2"><i class="fa-solid fa-bars"></i></button>
                <div class="w-px h-8 bg-border-theme md:hidden"></div>
                <div>
                    <h2 class="text-xl lg:text-3xl font-black text-strong uppercase tracking-tight">Caixa de Ação</h2>
                    <p class="text-[9px] lg:text-xs font-bold uppercase tracking-[0.2em] text-muted mt-1">Transformando intenção em execução</p>
                </div>
            </div>
            
            <div class="flex items-center gap-2 lg:gap-3">
                <button onclick="abrirModalSync()" class="bg-panel border border-theme hover:border-blue-500 text-strong hover:text-blue-500 px-3 py-2 rounded-xl text-[10px] font-black transition-colors shadow-sm flex items-center gap-2 group">
                    <i class="fa-solid fa-cloud-arrow-up text-blue-500 group-hover:animate-bounce"></i> <span class="hidden md:inline uppercase tracking-widest">Sync</span>
                </button>
                <button id="theme-toggle" class="w-10 h-10 lg:w-12 lg:h-12 rounded-xl bg-panel border border-theme flex items-center justify-center text-strong hover:text-blue-500 transition-all shadow-sm"><i class="fa-solid fa-moon text-lg"></i></button>
            </div>
        </header>

        <div class="flex-1 flex flex-col lg:flex-row overflow-hidden max-w-[1600px] w-full mx-auto">
            
            <div id="painel-lista" class="w-full lg:w-1/3 flex flex-col border-r border-theme bg-bg-color h-full transition-all duration-300">
                
                <div class="p-4 lg:p-5 border-b border-theme shrink-0 space-y-4">
                    <div class="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                        <button onclick="filtrarTarefas('Pendentes')" id="filtro-Pendentes" class="filtro-btn px-4 py-2 rounded-xl text-xs font-bold transition-all bg-accent text-bg-color whitespace-nowrap shadow-md">Pendentes</button>
                        <button onclick="filtrarTarefas('Concluídas')" id="filtro-Concluídas" class="filtro-btn px-4 py-2 rounded-xl text-xs font-bold transition-all bg-panel border border-theme text-muted hover:text-strong whitespace-nowrap">Arquivadas</button>
                    </div>
                    
                    <div class="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                        <button onclick="filtrarTag('Todas')" id="tag-Todas" class="tag-btn px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-widest bg-blue-500 text-white transition-colors">Todas</button>
                        <button onclick="filtrarTag('Profissional')" id="tag-Profissional" class="tag-btn px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-widest bg-panel border border-theme text-muted hover:text-blue-500 transition-colors">Profissional</button>
                        <button onclick="filtrarTag('Saúde')" id="tag-Saúde" class="tag-btn px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-widest bg-panel border border-theme text-muted hover:text-red-500 transition-colors">Saúde</button>
                        <button onclick="filtrarTag('Estudos')" id="tag-Estudos" class="tag-btn px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-widest bg-panel border border-theme text-muted hover:text-purple-500 transition-colors">Estudos</button>
                        <button onclick="filtrarTag('Pessoal')" id="tag-Pessoal" class="tag-btn px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-widest bg-panel border border-theme text-muted hover:text-accent transition-colors">Pessoal</button>
                    </div>
                </div>

                <div class="p-4 lg:p-5 border-b border-theme shrink-0">
                    <form onsubmit="event.preventDefault(); criarTarefaRapida();" class="flex gap-2">
                        <input type="text" id="nova-tarefa-input" class="flex-1 bg-panel border border-theme rounded-xl p-3 text-sm font-semibold text-strong focus:outline-none focus:border-blue-500 transition-colors" placeholder="Adicionar nova tarefa... (Enter)">
                        <button type="submit" class="bg-blue-500 text-white w-12 rounded-xl flex items-center justify-center hover:bg-blue-600 transition-colors"><i class="fa-solid fa-plus"></i></button>
                    </form>
                </div>

                <div class="flex-1 overflow-y-auto custom-scrollbar p-3 space-y-2" id="lista-tarefas">
                </div>
            </div>

            <div id="painel-detalhe" class="hidden lg:block w-full lg:w-2/3 h-full bg-panel/30 overflow-y-auto custom-scrollbar p-4 lg:p-8 relative transition-all duration-300">
                
                <button onclick="voltarLista()" class="lg:hidden text-muted hover:text-blue-500 font-black text-xs uppercase tracking-widest mb-4 flex items-center gap-2 bg-bg-color border border-theme px-4 py-2 rounded-xl w-max">
                    <i class="fa-solid fa-arrow-left"></i> Voltar para Lista
                </button>

                <div id="estado-vazio" class="absolute inset-0 flex flex-col items-center justify-center text-center opacity-50 z-10 pointer-events-none hidden lg:flex">
                    <i class="fa-solid fa-list-check text-5xl lg:text-6xl text-muted mb-4"></i>
                    <h3 class="text-xl font-black text-strong uppercase tracking-widest">Cérebro de Execução</h3>
                    <p class="text-sm text-muted font-bold mt-2">Selecione uma tarefa ao lado para focar e resolver.</p>
                </div>

                <div id="painel-tarefa" class="hidden fade-in space-y-6 lg:space-y-8 max-w-3xl mx-auto relative z-20 pb-20">
                    
                    <div class="glass-card p-5 lg:p-6 border-t-4 border-blue-500">
                        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-4 border-b border-theme pb-4">
                            <input type="text" id="detalhe-titulo" onblur="salvarDetalhes()" class="flex-1 bg-transparent border-none text-xl md:text-2xl font-black text-strong focus:outline-none focus:border-b focus:border-blue-500 transition-colors" placeholder="Título da Tarefa">
                            
                            <div class="flex items-center gap-2 shrink-0">
                                <button onclick="excluirTarefaAtual()" class="w-10 h-10 rounded-xl bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white transition-colors flex items-center justify-center" title="Excluir"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div>
                                <label class="block text-[10px] font-black uppercase tracking-widest text-muted mb-1"><i class="fa-solid fa-tag mr-1"></i> Categoria</label>
                                <select id="detalhe-tag" onchange="salvarDetalhes()" class="w-full bg-bg-color border border-theme rounded-lg p-2 text-xs font-bold text-strong focus:outline-none focus:border-blue-500 cursor-pointer appearance-none">
                                    <option value="Sem Tag">Sem Tag</option>
                                    <option value="Profissional">Profissional</option>
                                    <option value="Saúde">Saúde</option>
                                    <option value="Estudos">Estudos</option>
                                    <option value="Pessoal">Pessoal</option>
                                    <option value="Financeiro">Financeiro</option>
                                    <option value="Moto/Garagem">Moto/Garagem</option>
                                    <option value="Casa">Casa</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-black uppercase tracking-widest text-muted mb-1"><i class="fa-solid fa-fire mr-1"></i> Prioridade</label>
                                <select id="detalhe-prioridade" onchange="salvarDetalhes()" class="w-full bg-bg-color border border-theme rounded-lg p-2 text-xs font-bold text-strong focus:outline-none focus:border-blue-500 cursor-pointer appearance-none">
                                    <option value="Baixa">Baixa (Pode esperar)</option>
                                    <option value="Média">Média (Importante)</option>
                                    <option value="Alta">Alta (Urgente)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-black uppercase tracking-widest text-muted mb-1"><i class="fa-solid fa-calendar-day mr-1"></i> Data Alvo</label>
                                <input type="date" id="detalhe-data" onchange="salvarDetalhes()" class="w-full bg-bg-color border border-theme rounded-lg p-2 text-xs font-bold text-strong focus:outline-none focus:border-blue-500 cursor-pointer">
                            </div>
                        </div>
                    </div>

                    <div>
                        <h4 class="text-xs font-black uppercase tracking-widest text-muted mb-3 flex items-center gap-2"><i class="fa-solid fa-brain text-blue-500"></i> Como Resolver? (Plano de Ação)</h4>
                        <textarea id="detalhe-resolver" onblur="salvarDetalhes()" class="w-full h-32 glass-card p-4 text-sm font-semibold text-strong focus:outline-none focus:border-blue-500 resize-none placeholder-muted/50 custom-scrollbar" placeholder="Escreva aqui os passos mentais, links úteis, ou a estratégia para matar essa tarefa sem travar..."></textarea>
                    </div>

                    <div class="glass-card p-5 lg:p-6 border-t-4 border-accent">
                        <div class="flex justify-between items-center mb-4 border-b border-theme pb-2">
                            <h4 class="text-xs font-black uppercase tracking-widest text-muted"><i class="fa-solid fa-list-check text-accent mr-2"></i> Subtarefas (Micro-passos)</h4>
                        </div>
                        
                        <div id="lista-subtarefas" class="space-y-2 mb-4">
                        </div>

                        <form onsubmit="event.preventDefault(); adicionarSubtarefa();" class="flex gap-2 mt-4 pt-4 border-t border-theme border-dashed">
                            <input type="text" id="nova-subtarefa-input" class="flex-1 bg-bg-color border border-theme rounded-lg p-2.5 text-xs font-semibold text-strong focus:outline-none focus:border-accent" placeholder="Adicionar micro-passo...">
                            <button type="submit" class="bg-panel border border-theme text-muted hover:text-accent px-4 rounded-lg transition-colors font-bold text-xs">Add</button>
                        </form>
                    </div>

                    <div>
                        <h4 class="text-xs font-black uppercase tracking-widest text-muted mb-3 flex items-center gap-2"><i class="fa-solid fa-flag-checkered text-orange-500"></i> Anotações de Fechamento</h4>
                        <textarea id="detalhe-fechamento" onblur="salvarDetalhes()" class="w-full h-24 glass-card p-4 text-sm font-semibold text-strong focus:outline-none focus:border-orange-500 resize-none placeholder-muted/50 custom-scrollbar" placeholder="O que aprendeu? Algum problema que ocorreu durante a execução? Registre aqui antes de arquivar..."></textarea>
                    </div>

                    <div class="pt-6">
                        <button id="btn-arquivar" onclick="toggleArquivarAtual()" class="w-full py-4 rounded-xl font-black text-sm uppercase tracking-widest shadow-lg transition-all hover:scale-[1.02] flex items-center justify-center gap-2">
                            <i class="fa-solid fa-box-archive"></i> <span id="txt-btn-arquivar">Marcar como Concluída & Arquivar</span>
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <div id="modal-sync" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[100] hidden items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-bg-color border border-theme rounded-3xl w-full max-w-md shadow-2xl transform scale-95 transition-transform duration-300" id="ms-content">
            <div class="p-5 border-b border-theme flex justify-between items-center bg-panel rounded-t-3xl">
                <h3 class="text-xs font-black text-strong uppercase tracking-widest"><i class="fa-solid fa-cloud-arrow-up text-blue-500 mr-2"></i> Backup & Sync</h3>
                <button onclick="fecharModalSync()" class="text-muted hover:text-red-500 transition-colors w-8 h-8 flex items-center justify-center"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <div class="p-5 space-y-6">
                <div class="space-y-3">
                    <h4 class="text-[9px] font-black uppercase tracking-widest text-strong border-b border-theme/50 pb-1">Passo 1: Exportar</h4>
                    <button onclick="exportarBackup()" class="w-full bg-panel border border-theme hover:border-accent hover:text-accent text-strong py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all flex items-center justify-center gap-2"><i class="fa-solid fa-download"></i> Baixar Arquivo</button>
                </div>
                <div class="space-y-3 pt-4">
                    <h4 class="text-[9px] font-black uppercase tracking-widest text-strong border-b border-theme/50 pb-1">Passo 2: Importar</h4>
                    <input type="file" id="file-import" accept=".json" class="hidden" onchange="processarImportacao(event)">
                    <button onclick="document.getElementById('file-import').click()" class="w-full bg-blue-600 text-white py-3 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-lg hover:scale-[1.02] transition-transform flex items-center justify-center gap-2"><i class="fa-solid fa-upload"></i> Carregar Backup</button>
                </div>
            </div>
        </div>
    </div>

    <script src="components.js"></script>
    <script src="script.js"></script>
    
    <script>
        // ==========================================
        // BANCO DE DADOS E ESTADO
        // ==========================================
        const TAREFAS_KEY = 'lifeos_tarefas_v1';
        let tarefas = JSON.parse(localStorage.getItem(TAREFAS_KEY)) || [];
        
        // Estado atual da UI
        let statusFiltro = 'Pendentes'; // 'Pendentes' ou 'Concluídas'
        let tagFiltro = 'Todas';
        let tarefaAtivaId = null;

        // Configuração visual das tags e prioridades
        const tagCores = {
            'Profissional': 'text-blue-500 border-blue-500/30 bg-blue-500/10',
            'Saúde': 'text-red-500 border-red-500/30 bg-red-500/10',
            'Estudos': 'text-purple-500 border-purple-500/30 bg-purple-500/10',
            'Pessoal': 'text-accent border-accent/30 bg-accent/10',
            'Financeiro': 'text-orange-500 border-orange-500/30 bg-orange-500/10',
            'Moto/Garagem': 'text-zinc-400 border-zinc-400/30 bg-zinc-400/10',
            'Casa': 'text-teal-500 border-teal-500/30 bg-teal-500/10',
            'Sem Tag': 'text-muted border-theme bg-panel'
        };

        const prioCores = { 'Alta': 'text-red-500', 'Média': 'text-orange-500', 'Baixa': 'text-blue-500' };

        // ==========================================
        // RENDERIZAÇÃO DA LISTA (LADO ESQUERDO)
        // ==========================================
        function renderLista() {
            const container = document.getElementById('lista-tarefas');
            container.innerHTML = '';

            // Filtragem
            let filtradas = tarefas.filter(t => statusFiltro === 'Concluídas' ? t.arquivada : !t.arquivada);
            if (tagFiltro !== 'Todas') filtradas = filtradas.filter(t => t.tag === tagFiltro);

            // Ordenação (Prioridade Alta primeiro, depois data)
            filtradas.sort((a, b) => {
                const peso = {'Alta': 3, 'Média': 2, 'Baixa': 1};
                if(peso[b.prioridade] !== peso[a.prioridade]) return peso[b.prioridade] - peso[a.prioridade];
                return new Date(a.data || '2999-12-31') - new Date(b.data || '2999-12-31');
            });

            if(filtradas.length === 0) {
                container.innerHTML = `<div class="p-8 text-center text-muted"><i class="fa-solid fa-ghost text-3xl mb-3 opacity-50"></i><p class="text-xs font-bold uppercase tracking-widest">Lista Vazia</p></div>`;
                return;
            }

            filtradas.forEach(t => {
                const isActive = tarefaAtivaId === t.id;
                const activeClass = isActive ? 'border-blue-500 bg-blue-500/5 scale-[1.02]' : 'border-transparent hover:border-theme hover:bg-panel';
                const corTag = tagCores[t.tag] || tagCores['Sem Tag'];
                const corPrio = prioCores[t.prioridade] || 'text-muted';
                
                // Formatação de data
                const dataStr = t.data ? t.data.split('-').reverse().join('/') : 'Sem prazo';
                
                // Progresso Subtarefas
                const totalSub = t.subtarefas.length;
                const feitasSub = t.subtarefas.filter(s => s.feita).length;
                const subBadge = totalSub > 0 ? `<span class="text-[9px] font-bold text-muted ml-2"><i class="fa-solid fa-list-check mr-1"></i>${feitasSub}/${totalSub}</span>` : '';

                const card = document.createElement('div');
                card.className = `p-4 rounded-xl border transition-all cursor-pointer shadow-sm ${activeClass} ${t.arquivada ? 'opacity-60' : 'bg-panel'}`;
                card.onclick = () => abrirTarefa(t.id);
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[9px] font-black uppercase tracking-widest px-2 py-0.5 rounded border ${corTag}">${t.tag}</span>
                        <div class="flex items-center gap-2">
                            <i class="fa-solid fa-fire text-[10px] ${corPrio}" title="Prioridade ${t.prioridade}"></i>
                        </div>
                    </div>
                    <h4 class="text-sm font-bold text-strong leading-tight mb-2 ${t.arquivada ? 'line-through text-muted' : ''}">${t.titulo}</h4>
                    <div class="flex justify-between items-center mt-3 pt-3 border-t border-theme/50">
                        <span class="text-[10px] font-bold text-muted"><i class="fa-regular fa-calendar mr-1"></i> ${dataStr}</span>
                        ${subBadge}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // ==========================================
        // CÉREBRO DE EXECUÇÃO (LADO DIREITO / MOBILE)
        // ==========================================
        function abrirTarefa(id) {
            tarefaAtivaId = id;
            const tarefa = tarefas.find(t => t.id === id);
            if(!tarefa) return;

            // ADAPTAÇÃO MOBILE: Esconde lista, mostra painel
            if(window.innerWidth < 1024) {
                document.getElementById('painel-lista').classList.add('hidden');
                document.getElementById('painel-lista').classList.remove('flex');
                document.getElementById('painel-detalhe').classList.remove('hidden');
                document.getElementById('painel-detalhe').classList.add('block');
            }

            // Esconder vazio, mostrar painel (Desktop)
            document.getElementById('estado-vazio').classList.add('hidden');
            document.getElementById('estado-vazio').classList.remove('lg:flex');
            document.getElementById('painel-tarefa').classList.remove('hidden');

            // Preencher campos
            document.getElementById('detalhe-titulo').value = tarefa.titulo;
            document.getElementById('detalhe-tag').value = tarefa.tag || 'Sem Tag';
            document.getElementById('detalhe-prioridade').value = tarefa.prioridade || 'Média';
            document.getElementById('detalhe-data').value = tarefa.data || '';
            document.getElementById('detalhe-resolver').value = tarefa.comoResolver || '';
            document.getElementById('detalhe-fechamento').value = tarefa.fechamento || '';

            // Estilo do Botão Arquivar
            const btnArq = document.getElementById('btn-arquivar');
            const txtArq = document.getElementById('txt-btn-arquivar');
            if(tarefa.arquivada) {
                btnArq.className = "w-full py-4 rounded-xl font-black text-sm uppercase tracking-widest shadow-lg transition-all hover:scale-[1.02] flex items-center justify-center gap-2 bg-panel border border-theme text-muted hover:text-strong";
                txtArq.innerText = "Desarquivar Tarefa";
            } else {
                btnArq.className = "w-full py-4 rounded-xl font-black text-sm uppercase tracking-widest shadow-lg transition-all hover:scale-[1.02] flex items-center justify-center gap-2 bg-accent text-bg-color";
                txtArq.innerText = "Marcar como Concluída & Arquivar";
            }

            renderSubtarefas();
            renderLista(); // Atualiza a lista da esquerda para mostrar a seleção
        }

        function voltarLista() {
            tarefaAtivaId = null;
            // Mostra a lista, esconde o detalhe no celular
            document.getElementById('painel-detalhe').classList.add('hidden');
            document.getElementById('painel-detalhe').classList.remove('block');
            document.getElementById('painel-lista').classList.remove('hidden');
            document.getElementById('painel-lista').classList.add('flex');
            
            // Reseta a visão do detalhe
            document.getElementById('painel-tarefa').classList.add('hidden');
            document.getElementById('estado-vazio').classList.remove('hidden');
            document.getElementById('estado-vazio').classList.add('lg:flex');
            renderLista();
        }

        function salvarDetalhes() {
            if(!tarefaAtivaId) return;
            const idx = tarefas.findIndex(t => t.id === tarefaAtivaId);
            
            tarefas[idx].titulo = document.getElementById('detalhe-titulo').value || 'Tarefa sem título';
            tarefas[idx].tag = document.getElementById('detalhe-tag').value;
            tarefas[idx].prioridade = document.getElementById('detalhe-prioridade').value;
            tarefas[idx].data = document.getElementById('detalhe-data').value;
            tarefas[idx].comoResolver = document.getElementById('detalhe-resolver').value;
            tarefas[idx].fechamento = document.getElementById('detalhe-fechamento').value;
            
            salvarBD();
            renderLista();
        }

        // --- SUBTAREFAS ---
        function renderSubtarefas() {
            const tarefa = tarefas.find(t => t.id === tarefaAtivaId);
            const container = document.getElementById('lista-subtarefas');
            container.innerHTML = '';

            if(tarefa.subtarefas.length === 0) {
                container.innerHTML = `<p class="text-xs text-muted font-bold italic py-2">Nenhum micro-passo definido.</p>`;
                return;
            }

            tarefa.subtarefas.forEach((sub, index) => {
                const boxClass = sub.feita ? 'bg-accent border-accent text-white' : 'border-theme text-transparent hover:border-accent';
                const textClass = sub.feita ? 'text-muted line-through opacity-60' : 'text-strong';

                container.innerHTML += `
                    <div class="flex items-center gap-3 p-2 hover:bg-bg-color rounded-lg group border border-transparent hover:border-theme transition-colors">
                        <div onclick="toggleSubtarefa(${index})" class="w-5 h-5 rounded flex items-center justify-center cursor-pointer border transition-colors shrink-0 ${boxClass}">
                            <i class="fa-solid fa-check text-[10px]"></i>
                        </div>
                        <span class="text-sm font-semibold flex-1 ${textClass}">${sub.texto}</span>
                        <button onclick="excluirSubtarefa(${index})" class="text-muted hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity w-6 h-6 flex items-center justify-center"><i class="fa-solid fa-xmark text-xs"></i></button>
                    </div>
                `;
            });
        }

        function adicionarSubtarefa() {
            const input = document.getElementById('nova-subtarefa-input');
            const texto = input.value.trim();
            if(!texto || !tarefaAtivaId) return;

            const idx = tarefas.findIndex(t => t.id === tarefaAtivaId);
            tarefas[idx].subtarefas.push({ texto: texto, feita: false });
            input.value = '';
            
            salvarBD();
            renderSubtarefas();
            renderLista();
        }

        function toggleSubtarefa(subIndex) {
            const idx = tarefas.findIndex(t => t.id === tarefaAtivaId);
            tarefas[idx].subtarefas[subIndex].feita = !tarefas[idx].subtarefas[subIndex].feita;
            salvarBD();
            renderSubtarefas();
            renderLista();
        }

        function excluirSubtarefa(subIndex) {
            const idx = tarefas.findIndex(t => t.id === tarefaAtivaId);
            tarefas[idx].subtarefas.splice(subIndex, 1);
            salvarBD();
            renderSubtarefas();
            renderLista();
        }

        // ==========================================
        // AÇÕES PRINCIPAIS (CRUD TAREFA)
        // ==========================================
        function criarTarefaRapida() {
            const input = document.getElementById('nova-tarefa-input');
            const texto = input.value.trim();
            if(!texto) return;

            const novaTarefa = {
                id: Date.now(),
                titulo: texto,
                tag: tagFiltro === 'Todas' ? 'Sem Tag' : tagFiltro,
                prioridade: 'Média',
                data: '',
                comoResolver: '',
                subtarefas: [],
                fechamento: '',
                arquivada: false
            };

            tarefas.unshift(novaTarefa);
            input.value = '';
            salvarBD();
            renderLista();
            abrirTarefa(novaTarefa.id);
        }

        function excluirTarefaAtual() {
            if(!tarefaAtivaId) return;
            if(confirm("Tem certeza que deseja apagar esta tarefa definitivamente?")) {
                tarefas = tarefas.filter(t => t.id !== tarefaAtivaId);
                salvarBD();
                voltarLista(); // Faz reset de tela e listas
            }
        }

        function toggleArquivarAtual() {
            if(!tarefaAtivaId) return;
            const idx = tarefas.findIndex(t => t.id === tarefaAtivaId);
            
            tarefas[idx].arquivada = !tarefas[idx].arquivada;
            salvarBD();
            
            // Se arquivou e a gente está vendo 'Pendentes', tira da tela
            if(tarefas[idx].arquivada && statusFiltro === 'Pendentes') {
                voltarLista();
            } else {
                abrirTarefa(tarefas[idx].id); // Atualiza botões apenas
            }
        }

        function salvarBD() {
            localStorage.setItem(TAREFAS_KEY, JSON.stringify(tarefas));
        }

        // ==========================================
        // FILTROS DA UI
        // ==========================================
        function filtrarTarefas(status) {
            statusFiltro = status;
            document.getElementById('filtro-Pendentes').className = `filtro-btn px-4 py-2 rounded-xl text-xs font-bold transition-all whitespace-nowrap ${status === 'Pendentes' ? 'bg-accent text-bg-color shadow-md' : 'bg-panel border border-theme text-muted hover:text-strong'}`;
            document.getElementById('filtro-Concluídas').className = `filtro-btn px-4 py-2 rounded-xl text-xs font-bold transition-all whitespace-nowrap ${status === 'Concluídas' ? 'bg-accent text-bg-color shadow-md' : 'bg-panel border border-theme text-muted hover:text-strong'}`;
            voltarLista();
        }

        function filtrarTag(tag) {
            tagFiltro = tag;
            document.querySelectorAll('.tag-btn').forEach(btn => {
                if(btn.id === `tag-${tag}`) {
                    btn.className = `tag-btn px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-widest text-white transition-colors bg-blue-500 shadow-md`;
                } else {
                    btn.className = `tag-btn px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-widest bg-panel border border-theme text-muted hover:text-strong transition-colors`;
                }
            });
            voltarLista();
        }

        // ==========================================
        // BACKUP & SYNC
        // ==========================================
        window.abrirModalSync = function() { 
            document.getElementById('modal-sync').classList.remove('hidden'); 
            document.getElementById('modal-sync').classList.add('flex'); 
            setTimeout(() => { 
                document.getElementById('modal-sync').classList.remove('opacity-0'); 
                document.getElementById('ms-content').classList.remove('scale-95'); 
            }, 10); 
        };
        
        window.fecharModalSync = function() { 
            document.getElementById('modal-sync').classList.add('opacity-0'); 
            document.getElementById('ms-content').classList.add('scale-95'); 
            setTimeout(() => { 
                document.getElementById('modal-sync').classList.remove('flex'); 
                document.getElementById('modal-sync').classList.add('hidden'); 
            }, 300); 
        };
        
        window.exportarBackup = function() { 
            let backupData = {}; 
            for (let i = 0; i < localStorage.length; i++) { 
                const key = localStorage.key(i); 
                if (key.startsWith('lifeos_') || key === 'theme') { 
                    backupData[key] = localStorage.getItem(key); 
                } 
            } 
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backupData, null, 2)); 
            const downloadAnchorNode = document.createElement('a'); 
            downloadAnchorNode.setAttribute("href", dataStr); 
            const dataHoje = new Date().toISOString().split('T')[0]; 
            downloadAnchorNode.setAttribute("download", `lifeos_backup_${dataHoje}.json`); 
            document.body.appendChild(downloadAnchorNode); 
            downloadAnchorNode.click(); 
            downloadAnchorNode.remove(); 
        };
        
        window.processarImportacao = function(event) { 
            const file = event.target.files[0]; 
            if (!file) return; 
            const reader = new FileReader(); 
            reader.onload = function(e) { 
                try { 
                    const importedData = JSON.parse(e.target.result); 
                    let hasValidKeys = false; 
                    for (const key in importedData) { 
                        if (key.startsWith('lifeos_') || key === 'theme') hasValidKeys = true; 
                    } 
                    if(!hasValidKeys) { alert("Ficheiro inválido."); return; } 
                    
                    if(confirm("APAGAR DADOS ATUAIS e substituir pelo backup?")) { 
                        for (let i = localStorage.length - 1; i >= 0; i--) { 
                            const key = localStorage.key(i); 
                            if (key.startsWith('lifeos_')) localStorage.removeItem(key); 
                        } 
                        for (const key in importedData) { 
                            localStorage.setItem(key, importedData[key]); 
                        } 
                        alert("Sucesso!"); window.location.reload(); 
                    } 
                } catch (error) { 
                    alert("Erro de formato."); 
                } 
            }; 
            reader.readAsText(file); 
            event.target.value = ''; 
        };

        // Boot
        window.onload = renderLista;
    </script>
</body>
</html>
