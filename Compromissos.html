<!DOCTYPE html>
<html lang="pt-pt" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeOS | Compromissos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { accent: 'var(--accent)' } } }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .card-categoria-border { border-left-width: 4px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden bg-bg-color text-base transition-colors duration-300">

    <div id="sidebar-container" class="shrink-0 z-50 h-full flex flex-col transition-all duration-300"></div>

    <main class="flex-1 overflow-y-auto custom-scrollbar relative flex flex-col h-full w-full">
        
        <header class="sticky top-0 z-30 bg-bg-color/80 backdrop-blur-md border-b border-theme p-5 lg:p-8 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button id="mobile-menu-btn" class="md:hidden text-strong text-2xl hover:text-blue-500 transition-colors"><i class="fa-solid fa-bars"></i></button>
                <div class="w-px h-8 bg-border-theme md:hidden"></div>
                <div>
                    <h2 class="text-2xl lg:text-3xl font-black text-strong uppercase tracking-tight">Compromissos</h2>
                    <p class="text-[10px] lg:text-xs font-bold uppercase tracking-[0.2em] text-muted mt-1">Agenda & Eventos com Hora Marcada</p>
                </div>
            </div>
            <button id="theme-toggle" class="w-10 h-10 lg:w-12 lg:h-12 rounded-xl bg-panel border border-theme flex items-center justify-center text-strong hover:text-blue-500 transition-all shadow-sm"><i class="fa-solid fa-moon text-lg"></i></button>
        </header>

        <div class="p-5 lg:p-8 max-w-7xl mx-auto w-full space-y-8">

            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-panel border border-theme p-4 rounded-2xl">
                <div class="flex gap-2 overflow-x-auto no-scrollbar w-full md:w-auto">
                    <button onclick="filtrarTempo('Todos')" id="filtro-Todos" class="filtro-btn px-5 py-2 rounded-xl text-xs font-bold transition-all bg-blue-500 text-white shadow-md whitespace-nowrap">Todos</button>
                    <button onclick="filtrarTempo('Proximos')" id="filtro-Proximos" class="filtro-btn px-5 py-2 rounded-xl text-xs font-bold transition-all bg-bg-color border border-theme text-muted hover:text-strong whitespace-nowrap">Próximos 7 Dias</button>
                    <button onclick="filtrarTempo('Passados')" id="filtro-Passados" class="filtro-btn px-5 py-2 rounded-xl text-xs font-bold transition-all bg-bg-color border border-theme text-muted hover:text-strong whitespace-nowrap">Passados</button>
                </div>

                <div class="flex gap-3 w-full md:w-auto">
                    <button onclick="abrirModalCategorias()" class="flex-1 md:flex-none px-4 py-2.5 rounded-xl text-xs font-bold bg-bg-color border border-theme text-muted hover:text-strong transition-colors flex items-center justify-center gap-2">
                        <i class="fa-solid fa-tags"></i> <span class="hidden sm:inline">Categorias</span>
                    </button>
                    <button onclick="abrirModalCompromisso()" class="flex-1 md:flex-none px-5 py-2.5 rounded-xl text-xs font-black bg-blue-500 text-white shadow-lg hover:scale-105 transition-transform flex items-center justify-center gap-2">
                        <i class="fa-solid fa-plus"></i> AGENDAR
                    </button>
                </div>
            </div>

            <div id="grid-compromissos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-12">
                </div>

        </div>
    </main>

    <div id="modal-compromisso" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] hidden items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-panel border border-theme rounded-3xl w-full max-w-lg shadow-2xl transform scale-95 transition-transform duration-300" id="mc-content">
            <div class="p-6 border-b border-theme flex justify-between items-center bg-bg-color/50 rounded-t-3xl">
                <div><h3 id="mc-titulo-janela" class="text-xl font-black text-strong uppercase tracking-tight">Agendar Evento</h3></div>
                <button onclick="fecharModalCompromisso()" class="w-8 h-8 flex items-center justify-center rounded-lg bg-bg-color border border-theme text-muted hover:text-red-500 transition-colors"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div class="p-6 space-y-5 max-h-[70vh] overflow-y-auto custom-scrollbar">
                <input type="hidden" id="mc-id">

                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-muted mb-2">Título do Compromisso</label>
                    <input type="text" id="mc-titulo" class="w-full bg-bg-color border border-theme rounded-xl p-3 text-base font-bold text-strong focus:outline-none focus:border-blue-500 transition-colors" placeholder="Ex: Consulta Dr. Silva">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-black uppercase tracking-widest text-muted mb-2">Data</label>
                        <input type="date" id="mc-data" class="w-full bg-bg-color border border-theme rounded-xl p-3 text-sm font-semibold text-strong focus:outline-none focus:border-blue-500 transition-colors cursor-pointer">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black uppercase tracking-widest text-muted mb-2">Horário</label>
                        <input type="time" id="mc-hora" class="w-full bg-bg-color border border-theme rounded-xl p-3 text-sm font-semibold text-strong focus:outline-none focus:border-blue-500 transition-colors cursor-pointer">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-muted mb-2 flex justify-between">
                        <span>Categoria</span>
                        <span onclick="abrirModalCategorias()" class="text-blue-500 cursor-pointer hover:underline">Editar Categorias</span>
                    </label>
                    <select id="mc-categoria" class="w-full bg-bg-color border border-theme rounded-xl p-3 text-sm font-semibold text-strong focus:outline-none focus:border-blue-500 transition-colors cursor-pointer appearance-none"></select>
                </div>

                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-muted mb-2">Anotações (O que levar/preparar?)</label>
                    <textarea id="mc-notas" class="w-full h-28 bg-bg-color border border-theme rounded-xl p-3 text-sm font-semibold text-strong focus:outline-none focus:border-blue-500 resize-none placeholder-muted/50" placeholder="Ex: Levar exames de sangue, chegar 15 min antes..."></textarea>
                </div>
            </div>

            <div class="p-6 border-t border-theme flex justify-end gap-3 bg-bg-color/50 rounded-b-3xl">
                <button onclick="fecharModalCompromisso()" class="px-5 py-2.5 rounded-xl text-sm font-bold text-muted hover:bg-panel transition-colors">Cancelar</button>
                <button onclick="salvarCompromisso()" class="bg-blue-500 text-white px-8 py-2.5 rounded-xl text-sm font-black shadow-lg hover:scale-105 transition-transform">Salvar</button>
            </div>
        </div>
    </div>

    <div id="modal-categorias" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[110] hidden items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-panel border border-theme rounded-3xl w-full max-w-sm shadow-2xl transform scale-95 transition-transform duration-300" id="cat-content">
            <div class="p-6 border-b border-theme flex justify-between items-center">
                <h3 class="text-lg font-black text-strong uppercase tracking-tight">Categorias</h3>
                <button onclick="fecharModalCategorias()" class="text-muted hover:text-red-500 transition-colors"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            
            <div class="p-6">
                <form onsubmit="event.preventDefault(); criarCategoria();" class="flex gap-2 mb-6">
                    <input type="text" id="nova-cat-nome" class="flex-1 bg-bg-color border border-theme rounded-lg p-2 text-sm font-semibold text-strong focus:outline-none focus:border-blue-500" placeholder="Nova Categoria..." required>
                    <input type="color" id="nova-cat-cor" class="w-10 h-10 rounded-lg cursor-pointer bg-bg-color border border-theme p-1" value="#3B82F6">
                    <button type="submit" class="bg-blue-500 text-white w-10 rounded-lg flex items-center justify-center hover:bg-blue-600 transition-colors"><i class="fa-solid fa-plus"></i></button>
                </form>

                <div class="max-h-60 overflow-y-auto custom-scrollbar pr-2 space-y-2" id="lista-categorias-gerenciador"></div>
            </div>
        </div>
    </div>

    <script src="components.js"></script>
    <script src="script.js"></script>
    
    <script>
        const DB_COMPROMISSOS = 'lifeos_compromissos_v1';
        const DB_CATEGORIAS = 'lifeos_categorias_compromissos';

        const categoriasPadrao = [
            { id: 'cat1', nome: 'Pessoal', cor: '#10B981' },
            { id: 'cat2', nome: 'Profissional', cor: '#3B82F6' },
            { id: 'cat3', nome: 'Médico', cor: '#EF4444' },
            { id: 'cat4', nome: 'Estudos', cor: '#8B5CF6' }
        ];

        let compromissos = JSON.parse(localStorage.getItem(DB_COMPROMISSOS)) || [];
        let categorias = JSON.parse(localStorage.getItem(DB_CATEGORIAS)) || categoriasPadrao;
        let filtroAtual = 'Todos';

        function salvarDB() {
            localStorage.setItem(DB_COMPROMISSOS, JSON.stringify(compromissos));
            localStorage.setItem(DB_CATEGORIAS, JSON.stringify(categorias));
        }

        function formatarDataBR(dataIso) {
            if(!dataIso) return '--/--/----';
            const partes = dataIso.split('-');
            return `${partes[2]}/${partes[1]}/${partes[0]}`;
        }

        // --- MOTOR DE CÁLCULO DE TEMPO (NOVO) ---
        function calcularDiasFaltantes(dataIso) {
            if(!dataIso) return null;
            const hoje = new Date();
            hoje.setHours(0,0,0,0);
            
            // Corrige o fuso horário para garantir que o cálculo de dias seja exato
            const dataComp = new Date(dataIso + 'T00:00:00');
            dataComp.setHours(0,0,0,0);
            
            const diffTempo = dataComp.getTime() - hoje.getTime();
            const diffDias = Math.ceil(diffTempo / (1000 * 3600 * 24));
            return diffDias;
        }

        function isPassado(dataIso, hora) {
            if(!dataIso) return false;
            const agora = new Date();
            const dataComp = new Date(`${dataIso}T${hora || '23:59'}:00`);
            return dataComp < agora;
        }

        function isProximos7Dias(dataIso) {
            const dias = calcularDiasFaltantes(dataIso);
            return dias >= 0 && dias <= 7;
        }

        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function renderCompromissos() {
            const grid = document.getElementById('grid-compromissos');
            grid.innerHTML = '';

            let filtrados = compromissos.filter(c => {
                if(filtroAtual === 'Todos') return true;
                if(filtroAtual === 'Passados') return isPassado(c.data, c.hora);
                if(filtroAtual === 'Proximos') return !isPassado(c.data, c.hora) && isProximos7Dias(c.data);
                return true;
            });

            filtrados.sort((a, b) => {
                const dateA = new Date(`${a.data}T${a.hora || '00:00'}:00`);
                const dateB = new Date(`${b.data}T${b.hora || '00:00'}:00`);
                return filtroAtual === 'Passados' ? dateB - dateA : dateA - dateB;
            });

            if(filtrados.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center text-muted"><i class="fa-regular fa-calendar-xmark text-5xl mb-4 opacity-50"></i><p class="text-sm font-bold uppercase tracking-widest">Nenhum compromisso encontrado.</p></div>`;
                return;
            }

            filtrados.forEach(c => {
                const cat = categorias.find(x => x.id === c.categoriaId) || { nome: 'Sem Categoria', cor: '#9CA3AF' };
                const passado = isPassado(c.data, c.hora);
                const dataBr = formatarDataBR(c.data);
                const diasFaltantes = calcularDiasFaltantes(c.data);
                
                // --- LÓGICA DA BADGE DE CONTAGEM REGRESSIVA ---
                let badgeDias = '';
                if (diasFaltantes === 0 && !passado) {
                    badgeDias = `<span class="bg-red-500 text-white px-2 py-1 rounded text-[9px] font-black uppercase tracking-widest animate-pulse shadow-md">HOJE!</span>`;
                } else if (diasFaltantes === 0 && passado) {
                    badgeDias = `<span class="bg-bg-color border border-theme text-muted px-2 py-1 rounded text-[9px] font-black uppercase tracking-widest">Aconteceu Hoje</span>`;
                } else if (diasFaltantes === 1) {
                    badgeDias = `<span class="bg-orange-500 text-white px-2 py-1 rounded text-[9px] font-black uppercase tracking-widest shadow-md">Amanhã</span>`;
                } else if (diasFaltantes > 1 && diasFaltantes <= 7) {
                    badgeDias = `<span class="bg-blue-500/20 text-blue-500 px-2 py-1 rounded text-[9px] font-black uppercase tracking-widest">Faltam ${diasFaltantes} dias</span>`;
                } else if (diasFaltantes > 7) {
                    badgeDias = `<span class="bg-bg-color border border-theme text-muted px-2 py-1 rounded text-[9px] font-black uppercase tracking-widest">Faltam ${diasFaltantes} dias</span>`;
                } else if (diasFaltantes === -1) {
                    badgeDias = `<span class="bg-bg-color border border-theme text-muted px-2 py-1 rounded text-[9px] font-black uppercase tracking-widest">Ontem</span>`;
                } else {
                    badgeDias = `<span class="bg-bg-color border border-theme text-muted px-2 py-1 rounded text-[9px] font-black uppercase tracking-widest">Há ${Math.abs(diasFaltantes)} dias</span>`;
                }

                const notasResumo = c.notas ? (c.notas.length > 60 ? c.notas.substring(0, 60) + '...' : c.notas) : 'Nenhuma anotação adicional.';

                const card = document.createElement('div');
                card.className = `glass-card flex flex-col relative overflow-hidden transition-all duration-300 hover:-translate-y-1 hover:shadow-xl fade-in card-categoria-border ${passado ? 'opacity-60 grayscale-[50%]' : ''}`;
                card.style.borderLeftColor = cat.cor;

                card.innerHTML = `
                    <div class="p-6 flex-1 flex flex-col">
                        <div class="flex justify-between items-start mb-4">
                            <div class="flex items-center gap-2">
                                <span class="text-[9px] font-black uppercase tracking-widest px-2.5 py-1 rounded-md border" style="color: ${cat.cor}; background-color: ${hexToRgba(cat.cor, 0.1)}; border-color: ${hexToRgba(cat.cor, 0.2)}">
                                    ${cat.nome}
                                </span>
                                ${badgeDias}
                            </div>
                            <div class="flex gap-2">
                                <button onclick="editarCompromisso(${c.id})" class="text-muted hover:text-blue-500 transition-colors"><i class="fa-solid fa-pen text-xs"></i></button>
                                <button onclick="excluirCompromisso(${c.id})" class="text-muted hover:text-red-500 transition-colors"><i class="fa-solid fa-trash text-xs"></i></button>
                            </div>
                        </div>

                        <div class="flex items-center gap-3 mb-2">
                            <div class="bg-bg-color border border-theme rounded-xl px-3 py-1.5 flex flex-col items-center justify-center min-w-[60px]">
                                <span class="text-xs font-bold text-muted uppercase leading-none mb-1">${dataBr.substring(3,5)}</span>
                                <span class="text-xl font-black text-strong leading-none">${dataBr.substring(0,2)}</span>
                            </div>
                            <div>
                                <h3 class="text-lg font-black text-strong leading-tight">${c.titulo}</h3>
                                <p class="text-xs font-bold ${passado ? 'text-red-500' : 'text-blue-500'} mt-1"><i class="fa-regular fa-clock mr-1"></i> ${c.hora || 'O dia todo'}</p>
                            </div>
                        </div>

                        <div class="mt-auto pt-4 border-t border-theme/50">
                            <p class="text-xs text-muted font-semibold leading-relaxed"><i class="fa-solid fa-align-left mr-1 opacity-50"></i> ${notasResumo}</p>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filtrarTempo(filtro) {
            filtroAtual = filtro;
            document.querySelectorAll('.filtro-btn').forEach(btn => {
                if(btn.id === `filtro-${filtro}`) {
                    btn.className = "filtro-btn px-5 py-2 rounded-xl text-xs font-bold transition-all bg-blue-500 text-white shadow-md whitespace-nowrap";
                } else {
                    btn.className = "filtro-btn px-5 py-2 rounded-xl text-xs font-bold transition-all bg-bg-color border border-theme text-muted hover:text-strong whitespace-nowrap";
                }
            });
            renderCompromissos();
        }

        const modalComp = document.getElementById('modal-compromisso');
        const compContent = document.getElementById('mc-content');

        function atualizarSelectCategorias() {
            const select = document.getElementById('mc-categoria');
            select.innerHTML = '';
            categorias.forEach(cat => {
                select.innerHTML += `<option value="${cat.id}">${cat.nome}</option>`;
            });
        }

        function abrirModalCompromisso() {
            atualizarSelectCategorias();
            document.getElementById('mc-id').value = '';
            document.getElementById('mc-titulo').value = '';
            document.getElementById('mc-data').value = '';
            document.getElementById('mc-hora').value = '';
            document.getElementById('mc-notas').value = '';
            document.getElementById('mc-titulo-janela').innerText = 'Agendar Evento';

            modalComp.classList.remove('hidden');
            modalComp.classList.add('flex');
            setTimeout(() => { modalComp.classList.remove('opacity-0'); compContent.classList.remove('scale-95'); }, 10);
        }

        function editarCompromisso(id) {
            const c = compromissos.find(x => x.id === id);
            if(!c) return;
            atualizarSelectCategorias();
            
            document.getElementById('mc-id').value = c.id;
            document.getElementById('mc-titulo').value = c.titulo;
            document.getElementById('mc-data').value = c.data;
            document.getElementById('mc-hora').value = c.hora;
            document.getElementById('mc-categoria').value = c.categoriaId;
            document.getElementById('mc-notas').value = c.notas;
            document.getElementById('mc-titulo-janela').innerText = 'Editar Evento';

            modalComp.classList.remove('hidden');
            modalComp.classList.add('flex');
            setTimeout(() => { modalComp.classList.remove('opacity-0'); compContent.classList.remove('scale-95'); }, 10);
        }

        function fecharModalCompromisso() {
            modalComp.classList.add('opacity-0');
            compContent.classList.add('scale-95');
            setTimeout(() => { modalComp.classList.remove('flex'); modalComp.classList.add('hidden'); }, 300);
        }

        function salvarCompromisso() {
            const titulo = document.getElementById('mc-titulo').value.trim();
            const data = document.getElementById('mc-data').value;
            if(!titulo || !data) return alert("Título e Data são obrigatórios!");

            const idAtual = document.getElementById('mc-id').value;
            const dados = {
                titulo: titulo,
                data: data,
                hora: document.getElementById('mc-hora').value,
                categoriaId: document.getElementById('mc-categoria').value,
                notas: document.getElementById('mc-notas').value
            };

            if(idAtual) {
                const idx = compromissos.findIndex(x => x.id == idAtual);
                compromissos[idx] = { ...compromissos[idx], ...dados };
            } else {
                compromissos.push({ id: Date.now(), ...dados });
            }

            salvarDB();
            fecharModalCompromisso();
            renderCompromissos();
        }

        function excluirCompromisso(id) {
            if(confirm("Deseja realmente desmarcar/excluir este compromisso?")) {
                compromissos = compromissos.filter(x => x.id !== id);
                salvarDB();
                renderCompromissos();
            }
        }

        const modalCat = document.getElementById('modal-categorias');
        const catContent = document.getElementById('cat-content');

        function abrirModalCategorias() {
            renderListaCategoriasGerenciador();
            modalCat.classList.remove('hidden');
            modalCat.classList.add('flex');
            setTimeout(() => { modalCat.classList.remove('opacity-0'); catContent.classList.remove('scale-95'); }, 10);
        }

        function fecharModalCategorias() {
            modalCat.classList.add('opacity-0');
            catContent.classList.add('scale-95');
            setTimeout(() => { modalCat.classList.remove('flex'); modalCat.classList.add('hidden'); }, 300);
            atualizarSelectCategorias(); 
            renderCompromissos(); 
        }

        function renderListaCategoriasGerenciador() {
            const container = document.getElementById('lista-categorias-gerenciador');
            container.innerHTML = '';
            
            categorias.forEach(cat => {
                container.innerHTML += `
                    <div class="flex items-center justify-between p-2 rounded-lg bg-bg-color border border-theme">
                        <div class="flex items-center gap-3">
                            <div class="w-4 h-4 rounded-full" style="background-color: ${cat.cor}"></div>
                            <span class="text-sm font-bold text-strong">${cat.nome}</span>
                        </div>
                        <button onclick="excluirCategoria('${cat.id}')" class="text-muted hover:text-red-500 w-8 h-8 flex items-center justify-center rounded transition-colors"><i class="fa-solid fa-trash text-xs"></i></button>
                    </div>
                `;
            });
        }

        function criarCategoria() {
            const nome = document.getElementById('nova-cat-nome').value.trim();
            const cor = document.getElementById('nova-cat-cor').value;
            if(!nome) return;

            categorias.push({ id: 'cat_' + Date.now(), nome, cor });
            document.getElementById('nova-cat-nome').value = '';
            salvarDB();
            renderListaCategoriasGerenciador();
        }

        function excluirCategoria(id) {
            const emUso = compromissos.some(c => c.categoriaId === id);
            if(emUso) {
                alert("Você não pode excluir esta categoria pois existem compromissos usando ela. Altere os compromissos primeiro.");
                return;
            }
            if(confirm("Excluir esta categoria?")) {
                categorias = categorias.filter(x => x.id !== id);
                salvarDB();
                renderListaCategoriasGerenciador();
            }
        }

        window.onload = renderCompromissos;
    </script>
</body>
</html>
